<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kickboxing Matchmaker (Admin)</title>

<style>
body{
    margin:0;
    font-family: Arial;
    background:#0f0f0f;
    color:white;
}

header{
    text-align:center;
    padding:25px;
    background:#1a1a1a;
}

.container{
    max-width:900px;
    margin:auto;
    padding:20px;
}

.card{
    background:#1c1c1c;
    padding:15px;
    margin-bottom:15px;
    border-radius:10px;
}

input{
    width:100%;
    padding:10px;
    margin:5px 0;
}

button{
    width:100%;
    padding:10px;
    background:red;
    border:none;
    color:white;
    cursor:pointer;
    margin-top:5px;
}

.list-item, .match-item{
    padding:8px;
    margin-top:5px;
    background:#2a2a2a;
    border-radius:5px;
}

.admin-box{
    background:#2b1a1a;
    padding:10px;
    border-radius:10px;
    margin-bottom:10px;
}
</style>
</head>

<body>

<header>
    <h1>Kickboxing Matchmaker</h1>
    <p>Trainers voegen vechters toe • Admin maakt matches</p>
</header>

<div class="container">

    <!-- ADMIN LOGIN SIMPEL -->
    <div class="card admin-box">
        <h3>Admin toegang</h3>
        <input id="adminPass" type="password" placeholder="Admin wachtwoord">
        <button onclick="checkAdmin()">Login</button>
        <p id="adminStatus">Niet ingelogd</p>
    </div>

    <!-- ADD FIGHTER -->
    <div class="card">
        <h3>Trainer: Voeg vechter toe</h3>

        <input id="firstName" placeholder="Voornaam">
        <input id="lastName" placeholder="Achternaam">
        <input id="weight" type="number" placeholder="Gewicht (kg)">
        <input id="record" placeholder="Record (bijv. 5-1)">

        <button onclick="addFighter()">Toevoegen</button>
    </div>

    <!-- FIGHTERS -->
    <div class="card">
        <h3>Vechters</h3>
        <div id="fighters">Nog geen vechters</div>
    </div>

    <!-- ADMIN MATCH BUTTON -->
    <div class="card">
        <h3>Matches (alleen admin)</h3>
        <button onclick="createMatches()">Maak matches</button>
        <div id="matches">Nog geen matches</div>
    </div>

</div>

    if(pass === "admin123"){
        isAdmin = true;
        document.getElementById("adminStatus").innerText = "Admin ingelogd ✅";
    } else {
        alert("Fout wachtwoord");
    }
