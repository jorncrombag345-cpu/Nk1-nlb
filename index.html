<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kickboxing Matchmaker</title>

<style>
body{
    font-family: Arial, sans-serif;
    background:#111;
    color:white;
    margin:0;
    padding:20px;
}

h1{
    text-align:center;
}

.card{
    background:#222;
    padding:15px;
    border-radius:10px;
    margin-bottom:15px;
}

input{
    width:100%;
    padding:10px;
    margin:5px 0;
    box-sizing:border-box;
}

button{
    width:100%;
    padding:10px;
    background:#e53935;
    color:white;
    border:none;
    border-radius:5px;
    cursor:pointer;
}

button:hover{
    opacity:0.9;
}

.item{
    background:#333;
    padding:10px;
    margin-top:5px;
    border-radius:5px;
}
</style>
</head>
<body>

<h1>🥊 Kickboxing Matchmaker</h1>

<div class="card">
    <h2>Admin Login</h2>
    <input type="password" id="password" placeholder="Wachtwoord">
    <button onclick="login()">Login</button>
    <p id="status">Niet ingelogd</p>
</div>

<div class="card">
    <h2>Trainer: Voeg vechter toe</h2>

    <input type="text" id="voornaam" placeholder="Voornaam">
    <input type="text" id="achternaam" placeholder="Achternaam">
    <input type="number" id="gewicht" placeholder="Gewicht (kg)">
    <input type="text" id="record" placeholder="Record (bijv. 8-2)">

    <button onclick="addFighter()">Vechter toevoegen</button>
</div>

<div class="card">
    <h2>Vechters</h2>
    <div id="fighters"></div>
</div>

<div class="card">
    <h2>Matches (alleen admin)</h2>
    <button onclick="makeMatches()">Maak Matches</button>
    <div id="matches"></div>
</div>

<script>
let fighters = [];
let admin = false;

function login(){
    const pass = document.getElementById("password").value;

    if(pass === "admin123"){
        admin = true;
        document.getElementById("status").innerText =
            "✅ Ingelogd als admin";
    }else{
        alert("Verkeerd wachtwoord");
    }
}

function addFighter(){

    const voornaam =
        document.getElementById("voornaam").value.trim();

    const achternaam =
        document.getElementById("achternaam").value.trim();

    const gewicht =
        parseFloat(document.getElementById("gewicht").value);

    const record =
        document.getElementById("record").value.trim();

    if(
        voornaam === "" ||
        achternaam === "" ||
        isNaN(gewicht) ||
        record === ""
    ){
        alert("Vul alle velden in");
        return;
    }

    fighters.push({
        voornaam,
        achternaam,
        gewicht,
        record
    });

    renderFighters();

    document.getElementById("voornaam").value = "";
    document.getElementById("achternaam").value = "";
    document.getElementById("gewicht").value = "";
    document.getElementById("record").value = "";
}

function renderFighters(){

    const container =
        document.getElementById("fighters");

    container.innerHTML = "";

    if(fighters.length === 0){
        container.innerHTML =
            "<div class='item'>Nog geen vechters</div>";
        return;
    }

    fighters.forEach(f => {

        const div = document.createElement("div");

        div.className = "item";

        div.innerHTML =
            "<b>" + f.voornaam + " " + f.achternaam + "</b><br>" +
            "Gewicht: " + f.gewicht + " kg<br>" +
            "Record: " + f.record;

        container.appendChild(div);
    });
}

function makeMatches(){

    if(!admin){
        alert("Alleen admin kan matches maken");
        return;
    }

    const container =
        document.getElementById("matches");

    container.innerHTML = "";

    let found = false;

    for(let i=0;i<fighters.length;i++){

        for(let j=i+1;j<fighters.length;j++){

            const verschil =
                Math.abs(
                    fighters[i].gewicht -
                    fighters[j].gewicht
                );

            if(verschil <= 3){

                found = true;

                const div =
                    document.createElement("div");

                div.className = "item";

                div.innerHTML =
                    fighters[i].voornaam +
                    " " +
                    fighters[i].achternaam +
                    " VS " +
                    fighters[j].voornaam +
                    " " +
                    fighters[j].achternaam +
                    " (" +
                    verschil +
                    " kg verschil)";

                container.appendChild(div);
            }
        }
    }

    if(!found){
        container.innerHTML =
            "<div class='item'>Geen geschikte matches gevonden</div>";
    }
}

renderFighters();
</script>

</body>
</html>
