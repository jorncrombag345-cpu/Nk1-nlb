<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kickboxing Matchmaker</title>

<style>
body{
    margin:0;
    font-family: Arial;
    background:#0f0f0f;
    color:white;
}

header{
    text-align:center;
    padding:30px;
    background:#1a1a1a;
}

.container{
    max-width:800px;
    margin:auto;
    padding:20px;
}

.card{
    background:#1c1c1c;
    padding:15px;
    margin-bottom:15px;
    border-radius:10px;
}

input{
    width:100%;
    padding:10px;
    margin:5px 0;
}

button{
    width:100%;
    padding:10px;
    background:red;
    border:none;
    color:white;
    cursor:pointer;
}

.match{
    padding:8px;
    margin-top:5px;
    background:#2a2a2a;
    border-radius:5px;
}
</style>
</head>

<body>

<header>
    <h1>Kickboxing Matchmaker</h1>
</header>

<div class="container">

    <div class="card">
        <h3>Voeg vechter toe</h3>
        <input id="name" placeholder="Naam">
        <input id="weight" type="number" placeholder="Gewicht">
        <button onclick="addFighter()">Toevoegen</button>
    </div>

    <div class="card">
        <h3>Matches</h3>
        <div id="matches">Nog geen matches</div>
    </div>

</div>

<script>
let fighters = [];

function addFighter(){
    let name = document.getElementById("name").value;
    let weight = document.getElementById("weight").value;

    if(name === "" || weight === ""){
        alert("Vul alles in!");
        return;
    }

    fighters.push({
        name: name,
        weight: parseFloat(weight)
    });

    document.getElementById("name").value = "";
    document.getElementById("weight").value = "";

    updateMatches();
}

function updateMatches(){
    let output = document.getElementById("matches");
    output.innerHTML = "";

    let found = false;

    for(let i=0;i<fighters.length;i++){
        for(let j=i+1;j<fighters.length;j++){

            let diff = Math.abs(fighters[i].weight - fighters[j].weight);

            if(diff <= 3){
                found = true;

                let div = document.createElement("div");
                div.className = "match";
                div.innerHTML =
                    fighters[i].name + " vs " + fighters[j].name +
                    " (" + diff + "kg verschil)";

                output.appendChild(div);
            }
        }
    }

    if(!found){
        output.innerHTML = "Nog geen matches";
    }
}
</script>

</body>
</html>
