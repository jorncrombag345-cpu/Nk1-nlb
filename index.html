<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kickboxing Matchmaker Pro</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
font-family:Arial,sans-serif;
background:#0f172a;
color:white;
}

header{
padding:30px;
text-align:center;
background:linear-gradient(90deg,#dc2626,#ea580c);
}

.container{
max-width:1200px;
margin:auto;
padding:20px;
}

.card{
background:#1e293b;
padding:20px;
border-radius:15px;
margin-bottom:20px;
}

h2{
margin-bottom:10px;
}

input,select{
width:100%;
padding:12px;
margin-top:8px;
border:none;
border-radius:8px;
}

button{
width:100%;
padding:12px;
margin-top:10px;
border:none;
border-radius:8px;
cursor:pointer;
font-weight:bold;
}

.red{
background:#dc2626;
color:white;
}

.green{
background:#16a34a;
color:white;
}

.item{
background:#334155;
padding:12px;
border-radius:10px;
margin-top:10px;
}

.badge{
display:inline-block;
padding:5px 10px;
background:#475569;
border-radius:6px;
margin-top:5px;
}

.main{
background:#f59e0b;
color:black;
font-weight:bold;
padding:5px 10px;
border-radius:6px;
}

.comain{
background:#06b6d4;
color:black;
font-weight:bold;
padding:5px 10px;
border-radius:6px;
}

</style>
</head>
<body>

<header>
<h1>🥊 Kickboxing Matchmaker Pro</h1>
<p>Admin beheert alle wedstrijden</p>
</header>

<div class="container">

<div class="card">

<h2>Admin Login</h2>

<input
type="password"
id="adminPassword"
placeholder="Admin wachtwoord">

<button
class="green"
onclick="loginAdmin()">
Login
</button>

<p id="adminStatus">
❌ Niet ingelogd
</p>

</div>

<div class="card">

<h2>Coach: Vechter Toevoegen</h2>

<input id="coach" placeholder="Coach / Gym">

<input id="voornaam" placeholder="Voornaam">

<input id="achternaam" placeholder="Achternaam">

<input id="leeftijd" type="number" placeholder="Leeftijd">

<input id="gewicht" type="number" placeholder="Gewicht">

<input id="record" placeholder="Record (8-2)">

<input id="partijen" type="number" placeholder="Aantal partijen">

<select id="klasse">
<option>J-Klasse</option>
<option>D-Klasse</option>
<option>C-Klasse</option>
<option>B-Klasse</option>
<option>A-Klasse</option>
<option>N-Klasse</option>
<option>Pro Klasse</option>
</select>

<button
class="red"
onclick="addFighter()">
Vechter Toevoegen
</button>

</div>

<div class="card">

<h2>Alle Vechters</h2>

<div id="fighterList"></div>

</div>

<div class="card">

<h2>Admin Matchmaker</h2>

<select id="fighterA"></select>

<select id="fighterB"></select>

<input
id="fightOrder"
type="number"
placeholder="Fight Nummer">

<select id="fightType">
<option>Normale Match</option>
<option>Co-Main Event</option>
<option>Main Event</option>
</select>

<select id="fightStatus">
<option>Gepland</option>
<option>Bevestigd</option>
<option>Geannuleerd</option>
</select>

<button
class="green"
onclick="createMatch()">
Maak Wedstrijd
</button>

</div>

<div class="card">

<h2>Fight Card</h2>

<div id="matchList"></div>

</div>

</div>

<script>

let admin=false;

let fighters=
JSON.parse(
localStorage.getItem("fighters")
)||[];

let matches=
JSON.parse(
localStorage.getItem("matches")
)||[];

function saveData(){

localStorage.setItem(
"fighters",
JSON.stringify(fighters)
);

localStorage.setItem(
"matches",
JSON.stringify(matches)
);

}

function loginAdmin(){

let pass=
document.getElementById(
"adminPassword"
).value;

if(pass==="admin123"){

admin=true;

document.getElementById(
"adminStatus"
).innerHTML=
"✅ Admin Ingelogd";

}else{

alert(
"Wachtwoord fout"
);

}

}

function addFighter(){

let coach=
document.getElementById("coach").value;

let voornaam=
document.getElementById("voornaam").value;

let achternaam=
document.getElementById("achternaam").value;

let leeftijd=
document.getElementById("leeftijd").value;

let gewicht=
document.getElementById("gewicht").value;

let record=
document.getElementById("record").value;

let partijen=
document.getElementById("partijen").value;

let klasse=
document.getElementById("klasse").value;

if(
coach===""||
voornaam===""||
achternaam===""||
leeftijd===""||
gewicht===""||
record===""||
partijen===""){
alert("Vul alles in");
return;
}

fighters.push({

coach,

naam:
voornaam+" "+achternaam,

leeftijd,

gewicht,

record,

partijen,

klasse

});

saveData();

renderFighters();
updateDropdowns();

document.querySelectorAll("input").forEach(
i=>{
if(i.type!=="password"){
i.value="";
}
}
);

}

function deleteFighter(index){

if(!admin){
alert("Alleen admin");
return;
}

fighters.splice(index,1);

saveData();

renderFighters();
updateDropdowns();

}

function renderFighters(){

let box=
document.getElementById(
"fighterList"
);

box.innerHTML="";

fighters.forEach((f,index)=>{

box.innerHTML+=`

<div class="item">

<h3>${f.naam}</h3>

<p>Coach: ${f.coach}</p>

<p>Leeftijd: ${f.leeftijd}</p>

<p>Gewicht: ${f.gewicht} kg</p>

<p>Record: ${f.record}</p>

<p>Partijen: ${f.partijen}</p>

<span class="badge">
${f.klasse}
</span>

<br><br>

<button
class="red"
onclick="deleteFighter(${index})">
Verwijderen
</button>

</div>

`;

});

}

function updateDropdowns(){

let a=
document.getElementById(
"fighterA"
);

let b=
document.getElementById(
"fighterB"
);

a.innerHTML="";
b.innerHTML="";

fighters.forEach((f,index)=>{

a.innerHTML+=
`<option value="${index}">
${f.naam} | ${f.klasse}
</option>`;

b.innerHTML+=
`<option value="${index}">
${f.naam} | ${f.klasse}
</option>`;

});

}

function createMatch(){

if(!admin){

alert(
"Log eerst in als admin"
);

return;
}

let a=
document.getElementById(
"fighterA"
).value;

let b=
document.getElementById(
"fighterB"
).value;

if(a===b){

alert(
"Kies twee verschillende vechters"
);

return;
}

let order=
document.getElementById(
"fightOrder"
).value;

let type=
document.getElementById(
"fightType"
).value;

let status=
document.getElementById(
"fightStatus"
).value;

matches.push({

order:Number(order),

type,

status,

fighterA:
fighters[a].naam,

fighterB:
fighters[b].naam,

klasse:
fighters[a].klasse

});

saveData();

renderMatches();

}

function deleteMatch(index){

if(!admin){
alert("Alleen admin");
return;
}

matches.splice(index,1);

saveData();

renderMatches();

}

function renderMatches(){

let box=
document.getElementById(
"matchList"
);

box.innerHTML="";

matches.sort(
(a,b)=>
a.order-b.order
);

matches.forEach((m,index)=>{

let badge="";

if(
m.type==="Main Event"
){
badge=
`<span class="main">
MAIN EVENT
</span>`;
}

if(
m.type==="Co-Main Event"
){
badge=
`<span class="comain">
CO-MAIN EVENT
</span>`;
}

box.innerHTML+=`

<div class="item">

<h3>
Fight #${m.order}
</h3>

${badge}

<br><br>

<b>
${m.fighterA}
</b>

VS

<b>
${m.fighterB}
</b>

<p>
Klasse:
${m.klasse}
</p>

<p>
Status:
${m.status}
</p>

<button
class="red"
onclick="deleteMatch(${index})">
Wedstrijd Verwijderen
</button>

</div>

`;

});

}

renderFighters();
renderMatches();
updateDropdowns();

</script>

</body>
</html>
