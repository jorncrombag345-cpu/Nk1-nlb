<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kickboxing Matchmaker</title>

<style>
body{
    margin:0;
    padding:20px;
    font-family:Arial,sans-serif;
    background:#111;
    color:white;
}

h1{
    text-align:center;
}

.card{
    background:#222;
    padding:15px;
    border-radius:10px;
    margin-bottom:15px;
}

input, select{
    width:100%;
    padding:10px;
    margin:5px 0;
    box-sizing:border-box;
}

button{
    width:100%;
    padding:10px;
    margin-top:5px;
    background:#e53935;
    color:white;
    border:none;
    border-radius:5px;
    cursor:pointer;
}

button:hover{
    opacity:0.9;
}

.item{
    background:#333;
    padding:10px;
    margin-top:8px;
    border-radius:5px;
}
</style>
</head>
<body>

<h1>🥊 Kickboxing Matchmaker</h1>

<div class="card">
    <h2>Admin Login</h2>

    <input
        type="password"
        id="adminPassword"
        placeholder="Admin wachtwoord">

    <button onclick="loginAdmin()">
        Login
    </button>

    <p id="loginStatus">
        Niet ingelogd
    </p>
</div>

<div class="card">
    <h2>Trainer: Vechter toevoegen</h2>

    <input id="voornaam" placeholder="Voornaam">

    <input id="achternaam" placeholder="Achternaam">

    <input
        id="gewicht"
        type="number"
        placeholder="Gewicht (kg)">

    <input
        id="record"
        placeholder="Record (bijv. 8-2)">

    <button onclick="addFighter()">
        Vechter toevoegen
    </button>
</div>

<div class="card">
    <h2>Vechters</h2>
    <div id="fighterList">
        Nog geen vechters
    </div>
</div>

<div class="card">
    <h2>Admin: Match maken</h2>

    <select id="fighterA"></select>

    <select id="fighterB"></select>

    <select id="status">
        <option>Gepland</option>
        <option>Bevestigd</option>
        <option>Geannuleerd</option>
    </select>

    <button onclick="createMatch()">
        Maak wedstrijd
    </button>
</div>

<div class="card">
    <h2>Wedstrijden</h2>
    <div id="matchList">
        Nog geen wedstrijden
    </div>
</div>

<script>

let admin = false;

let fighters = [];

let matches = [];

function loginAdmin(){

    let pass =
        document.getElementById(
            "adminPassword"
        ).value;

    if(pass === "admin123"){

        admin = true;

        document.getElementById(
            "loginStatus"
        ).innerHTML =
        "✅ Admin ingelogd";

    }else{

        alert(
            "Verkeerd wachtwoord"
        );
    }
}

function addFighter(){

    let voornaam =
        document.getElementById(
            "voornaam"
        ).value.trim();

    let achternaam =
        document.getElementById(
            "achternaam"
        ).value.trim();

    let gewicht =
        document.getElementById(
            "gewicht"
        ).value;

    let record =
        document.getElementById(
            "record"
        ).value.trim();

    if(
        voornaam === "" ||
        achternaam === "" ||
        gewicht === "" ||
        record === ""
    ){
        alert(
            "Vul alle velden in"
        );
        return;
    }

    fighters.push({
        naam:
            voornaam +
            " " +
            achternaam,
        gewicht: gewicht,
        record: record
    });

    document.getElementById(
        "voornaam"
    ).value = "";

    document.getElementById(
        "achternaam"
    ).value = "";

    document.getElementById(
        "gewicht"
    ).value = "";

    document.getElementById(
        "record"
    ).value = "";

    renderFighters();
    updateDropdowns();
}

function renderFighters(){

    let box =
        document.getElementById(
            "fighterList"
        );

    box.innerHTML = "";

    if(fighters.length === 0){

        box.innerHTML =
        "Nog geen vechters";

        return;
    }

    fighters.forEach(function(f){

        box.innerHTML +=
        "<div class='item'>" +
        "<b>" +
        f.naam +
        "</b><br>" +
        "Gewicht: " +
        f.gewicht +
        " kg<br>" +
        "Record: " +
        f.record +
        "</div>";

    });
}

function updateDropdowns(){

    let a =
        document.getElementById(
            "fighterA"
        );

    let b =
        document.getElementById(
            "fighterB"
        );

    a.innerHTML = "";
    b.innerHTML = "";

    fighters.forEach(function(
        fighter,
        index
    ){

        let option1 =
            document.createElement(
                "option"
            );

        option1.value =
            index;

        option1.text =
            fighter.naam;

        let option2 =
            document.createElement(
                "option"
            );

        option2.value =
            index;

        option2.text =
            fighter.naam;

        a.appendChild(
            option1
        );

        b.appendChild(
            option2
        );
    });
}

function createMatch(){

    if(!admin){

        alert(
            "Alleen admin kan wedstrijden maken"
        );

        return;
    }

    let a =
        document.getElementById(
            "fighterA"
        ).value;

    let b =
        document.getElementById(
            "fighterB"
        ).value;

    let status =
        document.getElementById(
            "status"
        ).value;

    if(a === b){

        alert(
            "Kies twee verschillende vechters"
        );

        return;
    }

    matches.push({
        fighterA:
            fighters[a].naam,
        fighterB:
            fighters[b].naam,
        status:
            status
    });

    renderMatches();
}

function deleteMatch(index){

    if(!admin){

        alert(
            "Alleen admin kan wedstrijden verwijderen"
        );

        return;
    }

    matches.splice(
        index,
        1
    );

    renderMatches();
}

function renderMatches(){

    let box =
        document.getElementById(
            "matchList"
        );

    box.innerHTML = "";

    if(matches.length === 0){

        box.innerHTML =
        "Nog geen wedstrijden";

        return;
    }

    matches.forEach(function(
        match,
        index
    ){

        box.innerHTML +=

        "<div class='item'>" +

        "<b>" +
        match.fighterA +
        "</b> VS <b>" +
        match.fighterB +
        "</b><br>" +

        "Status: " +
        match.status +

        "<br><br>" +

        "<button onclick='deleteMatch(" +
        index +
        ")'>❌ Verwijderen</button>" +

        "</div>";
    });
}

renderFighters();

</script>

</body>
</html>
