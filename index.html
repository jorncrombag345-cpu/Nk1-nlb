<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kickboxing Matchmaker Admin</title>

<style>
body{
    font-family:Arial,sans-serif;
    background:#111;
    color:white;
    margin:0;
    padding:20px;
}

h1{
    text-align:center;
}

.card{
    background:#222;
    padding:15px;
    border-radius:10px;
    margin-bottom:15px;
}

input, select{
    width:100%;
    padding:10px;
    margin:5px 0;
    box-sizing:border-box;
}

button{
    width:100%;
    padding:10px;
    background:#d32f2f;
    color:white;
    border:none;
    border-radius:5px;
    cursor:pointer;
}

.item{
    background:#333;
    padding:10px;
    border-radius:5px;
    margin-top:5px;
}
</style>
</head>
<body>

<h1>🥊 Kickboxing Matchmaker</h1>

<div class="card">
    <h2>Admin Login</h2>
    <input type="password" id="adminPassword" placeholder="Admin wachtwoord">
    <button onclick="loginAdmin()">Login</button>
    <p id="loginStatus">Niet ingelogd</p>
</div>

<div class="card">
    <h2>Trainer: Vechter toevoegen</h2>

    <input id="voornaam" placeholder="Voornaam">
    <input id="achternaam" placeholder="Achternaam">
    <input id="gewicht" type="number" placeholder="Gewicht (kg)">
    <input id="record" placeholder="Record (bijv. 10-2)">

    <button onclick="addFighter()">Vechter toevoegen</button>
</div>

<div class="card">
    <h2>Alle Vechters</h2>
    <div id="fighterList"></div>
</div>

<div class="card">
    <h2>Admin: Maak Match</h2>

    <select id="fighterA"></select>

    <select id="fighterB"></select>

    <select id="status">
        <option>Gepland</option>
        <option>Bevestigd</option>
        <option>Geannuleerd</option>
    </select>

    <button onclick="createMatch()">Match aanmaken</button>
</div>

<div class="card">
    <h2>Wedstrijden</h2>
    <div id="matchList"></div>
</div>

<script>

let admin = false;

let fighters = [];

let matches = [];

function loginAdmin(){

    let password =
        document.getElementById("adminPassword").value;

    if(password === "admin123"){
        admin = true;

        document.getElementById("loginStatus")
        .innerHTML = "✅ Admin ingelogd";
    }else{
        alert("Verkeerd wachtwoord");
    }
}

function addFighter(){

    let voornaam =
        document.getElementById("voornaam").value.trim();

    let achternaam =
        document.getElementById("achternaam").value.trim();

    let gewicht =
        document.getElementById("gewicht").value;

    let record =
        document.getElementById("record").value.trim();

    if(
        voornaam === "" ||
        achternaam === "" ||
        gewicht === "" ||
        record === ""
    ){
        alert("Vul alle velden in");
        return;
    }

    fighters.push({
        naam:
        voornaam + " " + achternaam,
        gewicht: gewicht,
        record: record
    });

    document.getElementById("voornaam").value = "";
    document.getElementById("achternaam").value = "";
    document.getElementById("gewicht").value = "";
    document.getElementById("record").value = "";

    renderFighters();
    updateDropdowns();
}

function renderFighters(){

    let box =
        document.getElementById("fighterList");

    box.innerHTML = "";

    if(fighters.length === 0){
        box.innerHTML =
            "<div class='item'>Nog geen vechters</div>";
        return;
    }

    fighters.forEach(function(f){

        box.innerHTML +=
        "<div class='item'>" +
        "<b>" + f.naam + "</b><br>" +
        "Gewicht: " + f.gewicht + " kg<br>" +
        "Record: " + f.record +
        "</div>";

    });
}

function updateDropdowns(){

    let a =
        document.getElementById("fighterA");

    let b =
        document.getElementById("fighterB");

    a.innerHTML = "";
    b.innerHTML = "";

    fighters.forEach(function(f,index){

        let option1 =
            document.createElement("option");

        option1.value = index;
        option1.text = f.naam;

        let option2 =
            document.createElement("option");

        option2.value = index;
        option2.text = f.naam;

        a.appendChild(option1);
        b.appendChild(option2);
    });
}

function createMatch(){

    if(!admin){
        alert("Alleen admin kan matches maken");
        return;
    }

    let fighterA =
        document.getElementById("fighterA").value;

    let fighterB =
        document.getElementById("fighterB").value;

    let status =
        document.getElementById("status").value;

    if(fighterA === fighterB){
        alert("Kies twee verschillende vechters");
        return;
    }

    matches.push({
        a: fighters[fighterA].naam,
        b: fighters[fighterB].naam,
        status: status
    });

    renderMatches();
}

function renderMatches(){

    let box =
        document.getElementById("matchList");

    box.innerHTML = "";

    if(matches.length === 0){

        box.innerHTML =
        "<div class='item'>Nog geen wedstrijden</div>";

        return;
    }

    matches.forEach(function(m){

        box.innerHTML +=
        "<div class='item'>" +
        "<b>" + m.a + "</b> VS <b>" +
        m.b + "</b><br>" +
        "Status: " + m.status +
        "</div>";

    });
}

renderFighters();

</script>

</body>
</html>
