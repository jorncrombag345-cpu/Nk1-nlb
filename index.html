<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kickboxing Matchmaker</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    font-family:Arial,sans-serif;
    background:#0f172a;
    color:white;
    min-height:100vh;
}

header{
    background:linear-gradient(90deg,#dc2626,#ea580c);
    padding:25px;
    text-align:center;
}

.container{
    max-width:1100px;
    margin:auto;
    padding:20px;
}

.card{
    background:#1e293b;
    border-radius:15px;
    padding:20px;
    margin-bottom:20px;
}

h2{
    margin-bottom:10px;
}

input,select{
    width:100%;
    padding:12px;
    margin:6px 0;
    border:none;
    border-radius:8px;
}

button{
    width:100%;
    padding:12px;
    border:none;
    border-radius:8px;
    cursor:pointer;
    font-weight:bold;
}

.red{
    background:#dc2626;
    color:white;
}

.green{
    background:#16a34a;
    color:white;
}

.item{
    background:#334155;
    padding:12px;
    border-radius:10px;
    margin-top:8px;
}

.small-btn{
    margin-top:8px;
}
</style>
</head>
<body>

<header>
    <h1>🥊 Kickboxing Matchmaker</h1>
    <p>Admin beheert alle wedstrijden</p>
</header>

<div class="container">

<div class="card">
    <h2>Admin Login</h2>

    <input
        type="password"
        id="adminPassword"
        placeholder="Admin wachtwoord">

    <button
        class="green"
        onclick="loginAdmin()">
        Login
    </button>

    <p id="loginStatus">
        ❌ Niet ingelogd
    </p>
</div>

<div class="card">
    <h2>Vechter toevoegen</h2>

    <input
        id="naam"
        placeholder="Voornaam Achternaam">

    <input
        id="gewicht"
        type="number"
        placeholder="Gewicht">

    <input
        id="record"
        placeholder="Record (8-2)">

    <button
        class="red"
        onclick="addFighter()">
        Vechter toevoegen
    </button>
</div>

<div class="card">
    <h2>Vechters</h2>
    <div id="fighterList"></div>
</div>

<div class="card">
    <h2>Match maken (Admin)</h2>

    <select id="fighterA"></select>

    <select id="fighterB"></select>

    <select id="matchStatus">
        <option>Gepland</option>
        <option>Bevestigd</option>
        <option>Geannuleerd</option>
    </select>

    <button
        class="green"
        onclick="createMatch()">
        Maak Match
    </button>
</div>

<div class="card">
    <h2>Wedstrijden</h2>
    <div id="matchList"></div>
</div>

</div>

<script>

let admin = false;

let fighters =
JSON.parse(
localStorage.getItem("fighters")
) || [];

let matches =
JSON.parse(
localStorage.getItem("matches")
) || [];

function saveData(){

    localStorage.setItem(
        "fighters",
        JSON.stringify(fighters)
    );

    localStorage.setItem(
        "matches",
        JSON.stringify(matches)
    );
}

function loginAdmin(){

    let pass =
    document.getElementById(
        "adminPassword"
    ).value;

    if(pass === "admin123"){

        admin = true;

        document.getElementById(
            "loginStatus"
        ).innerHTML =
        "✅ Admin ingelogd";

    }else{

        alert(
            "Verkeerd wachtwoord"
        );
    }
}

function addFighter(){

    let naam =
    document.getElementById(
        "naam"
    ).value.trim();

    let gewicht =
    document.getElementById(
        "gewicht"
    ).value;

    let record =
    document.getElementById(
        "record"
    ).value.trim();

    if(
        naam === "" ||
        gewicht === "" ||
        record === ""
    ){
        alert(
            "Vul alle velden in"
        );
        return;
    }

    fighters.push({
        naam,
        gewicht,
        record
    });

    saveData();

    renderFighters();
    updateSelects();

    document.getElementById(
        "naam"
    ).value = "";

    document.getElementById(
        "gewicht"
    ).value = "";

    document.getElementById(
        "record"
    ).value = "";
}

function deleteFighter(index){

    if(!admin){
        alert(
        "Alleen admin kan verwijderen"
        );
        return;
    }

    fighters.splice(index,1);

    saveData();

    renderFighters();
    updateSelects();
}

function renderFighters(){

    let box =
    document.getElementById(
        "fighterList"
    );

    box.innerHTML = "";

    if(fighters.length === 0){

        box.innerHTML =
        "<div class='item'>Nog geen vechters</div>";

        return;
    }

    fighters.forEach(
    function(f,index){

        box.innerHTML +=

        "<div class='item'>" +

        "<b>" +
        f.naam +
        "</b><br>" +

        "Gewicht: " +
        f.gewicht +
        " kg<br>" +

        "Record: " +
        f.record +

        "<br><button class='small-btn red' onclick='deleteFighter(" +
        index +
        ")'>Verwijderen</button>" +

        "</div>";
    });
}

function updateSelects(){

    let a =
    document.getElementById(
        "fighterA"
    );

    let b =
    document.getElementById(
        "fighterB"
    );

    a.innerHTML = "";
    b.innerHTML = "";

    fighters.forEach(
    function(f,index){

        a.innerHTML +=
        "<option value='" +
        index +
        "'>" +
        f.naam +
        "</option>";

        b.innerHTML +=
        "<option value='" +
        index +
        "'>" +
        f.naam +
        "</option>";
    });
}

function createMatch(){

    if(!admin){

        alert(
        "Log eerst in als admin"
        );

        return;
    }

    let a =
    document.getElementById(
        "fighterA"
    ).value;

    let b =
    document.getElementById(
        "fighterB"
    ).value;

    let status =
    document.getElementById(
        "matchStatus"
    ).value;

    if(a === b){

        alert(
        "Kies twee verschillende vechters"
        );

        return;
    }

    matches.push({

        fighterA:
        fighters[a].naam,

        fighterB:
        fighters[b].naam,

        status:
        status
    });

    saveData();

    renderMatches();
}

function deleteMatch(index){

    if(!admin){

        alert(
        "Alleen admin"
        );

        return;
    }

    matches.splice(index,1);

    saveData();

    renderMatches();
}

function renderMatches(){

    let box =
    document.getElementById(
        "matchList"
    );

    box.innerHTML = "";

    if(matches.length === 0){

        box.innerHTML =
        "<div class='item'>Nog geen wedstrijden</div>";

        return;
    }

    matches.forEach(
    function(m,index){

        box.innerHTML +=

        "<div class='item'>" +

        "<b>" +
        m.fighterA +
        "</b> VS <b>" +
        m.fighterB +
        "</b><br>" +

        "Status: " +
        m.status +

        "<br><button class='small-btn red' onclick='deleteMatch(" +
        index +
        ")'>Wedstrijd verwijderen</button>" +

        "</div>";
    });
}

renderFighters();
renderMatches();
updateSelects();

</script>

</body>
</html>
